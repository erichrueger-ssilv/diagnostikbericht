<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#fffc00">
    <meta name="description" content="Erstellen Sie präzise psychologische Berichte mit lokaler KI-Unterstützung.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="DiagBericht">
    <title>Diagnostikbericht-Generator</title>
    <link rel="manifest" href="manifest.json?v=1.4">
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=1.4">
    <link rel="apple-touch-icon" href="favicon.svg?v=1.4">
    <link rel="stylesheet" href="styles.css?v=1.4">
    <link rel="stylesheet" href="zsl-theme.css?v=1.4">
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Local Libraries for Offline Support -->
    <script src="libs/react.min.js"></script>
    <script src="libs/react-dom.min.js"></script>
    <script src="libs/crypto-js.min.js"></script>
    <script src="libs/lucide.min.js"></script>
    <script src="libs/FileSaver.min.js"></script>
    <script src="libs/html-docx.js"></script>
    <script src="libs/marked.min.js"></script>
    <script src="libs/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="app.js?v=1.4"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('SW registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.warn('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
